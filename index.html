<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Generator</title>
  <style>
    :root {
      --panel-bg: rgba(20, 22, 34, 0.82);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #e8eaf2;
      --text-dim: #9aa0b4;
      --accent: #5b8cff;
      --bad: #ff6b6b;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0b0d18;
    }

    #stage { position: fixed; inset: 0; }

    #art {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    #art.grabbing { cursor: grabbing; }

    /* ---- Control panel ---- */
    #panel {
      position: fixed;
      top: 18px;
      left: 18px;
      width: 278px;
      max-height: calc(100vh - 36px);
      overflow-y: auto;
      padding: 18px 18px 20px;
      border-radius: 14px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--text);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      z-index: 10;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    #panel.collapsed {
      transform: translateX(calc(-100% - 24px));
      opacity: 0;
      pointer-events: none;
    }

    #panel h1 { margin: 0 0 2px; font-size: 16px; font-weight: 650; letter-spacing: 0.2px; }
    #panel .subtitle { margin: 0 0 16px; font-size: 12px; color: var(--text-dim); }

    .group { margin-bottom: 18px; }
    .section-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* Color rows */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .color-row input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid var(--panel-border);
      border-radius: 9px;
      background: none;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 3px; }
    .color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }
    .color-row input[type="color"]::-moz-color-swatch { border: none; border-radius: 6px; }

    .color-fields { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
    .color-fields .name { font-size: 12px; color: var(--text-dim); }
    .hexwrap { display: flex; align-items: center; }
    .hexwrap .hash { color: var(--text-dim); font-size: 13px; margin-right: 3px; }
    .color-fields input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--panel-border);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 8px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      outline: none;
    }
    .color-fields input[type="text"]:focus { border-color: var(--accent); }
    .color-fields input[type="text"].invalid { border-color: var(--bad); }

    /* Zoom control */
    .zoom-control { display: flex; align-items: center; gap: 10px; }
    .zoom-control input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.18);
      outline: none;
    }
    .zoom-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: 2px solid #dfe6ff;
    }
    .zoom-control input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: 2px solid #dfe6ff;
    }

    .btn {
      -webkit-appearance: none; appearance: none;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 8px;
      width: 30px; height: 30px;
      font-size: 17px; line-height: 1;
      cursor: pointer; flex: 0 0 auto;
      transition: background 0.15s ease;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.14); }
    .btn:active { transform: translateY(1px); }

    .zoom-readout {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .row-actions { display: flex; gap: 8px; margin-top: 4px; }
    .text-btn {
      flex: 1;
      -webkit-appearance: none; appearance: none;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 8px;
      font-size: 12px; cursor: pointer;
      transition: background 0.15s ease;
    }
    .text-btn:hover { background: rgba(255, 255, 255, 0.14); }
    .text-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .text-btn.primary:hover { background: #4a7bf0; }

    .hint { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-top: 10px; }

    #toggle {
      position: fixed; top: 18px; left: 18px; z-index: 11;
      width: 40px; height: 40px; border-radius: 10px;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      color: var(--text); cursor: pointer;
      display: none; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    #panel.collapsed ~ #toggle { display: flex; }
  </style>
</head>
<body>
  <div id="stage">
    <svg id="art" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="pat" patternUnits="userSpaceOnUse">
          <g id="g1"></g>
          <g id="g2"></g>
          <g id="g3"></g>
        </pattern>
      </defs>
      <rect id="fill" x="0" y="0" width="100%" height="100%" fill="url(#pat)"></rect>
    </svg>
  </div>

  <div id="panel">
    <h1>Pattern Generator</h1>
    <p class="subtitle">DB diagonal pattern &middot; three colors</p>

    <div class="group">
      <span class="section-label">Colors</span>

      <div class="color-row">
        <input type="color" id="sw1" aria-label="Color 1 swatch" />
        <div class="color-fields">
          <span class="name">Color 1 &middot; light</span>
          <div class="hexwrap"><span class="hash">#</span><input type="text" id="hx1" maxlength="6" spellcheck="false" /></div>
        </div>
      </div>

      <div class="color-row">
        <input type="color" id="sw2" aria-label="Color 2 swatch" />
        <div class="color-fields">
          <span class="name">Color 2 &middot; mid</span>
          <div class="hexwrap"><span class="hash">#</span><input type="text" id="hx2" maxlength="6" spellcheck="false" /></div>
        </div>
      </div>

      <div class="color-row">
        <input type="color" id="sw3" aria-label="Color 3 swatch" />
        <div class="color-fields">
          <span class="name">Color 3 &middot; dark</span>
          <div class="hexwrap"><span class="hash">#</span><input type="text" id="hx3" maxlength="6" spellcheck="false" /></div>
        </div>
      </div>
    </div>

    <div class="group">
      <span class="section-label">Zoom / Scale</span>
      <div class="zoom-control">
        <button class="btn" id="zoomOut" aria-label="Zoom out">&minus;</button>
        <input type="range" id="zoom" min="25" max="500" step="1" value="100" />
        <button class="btn" id="zoomIn" aria-label="Zoom in">+</button>
      </div>
      <div class="zoom-readout" id="zoomReadout">100%</div>
    </div>

    <div class="group" style="margin-bottom:0">
      <div class="row-actions">
        <button class="text-btn" id="resetBtn">Reset</button>
        <button class="text-btn primary" id="downloadBtn">Save PNG</button>
      </div>
      <p class="hint">Scroll to zoom &middot; drag to move the pattern.</p>
    </div>
  </div>

  <button id="toggle" aria-label="Show controls">&#9776;</button>

  <script src="pattern-data.js"></script>
  <script>
    (function () {
      "use strict";

      var DATA = window.PATTERN_DATA;
      var SVGNS = "http://www.w3.org/2000/svg";

      var art = document.getElementById("art");
      var pat = document.getElementById("pat");
      var groups = { c1: document.getElementById("g1"), c2: document.getElementById("g2"), c3: document.getElementById("g3") };

      // 100% zoom maps to this pattern scale (tuned to the reference density).
      var BASE_SCALE = 0.16;

      var DEFAULTS = {
        c1: DATA.colors.c1, // light
        c2: DATA.colors.c2, // mid
        c3: DATA.colors.c3, // dark
        zoom: 100
      };

      var state = {
        c1: DEFAULTS.c1, c2: DEFAULTS.c2, c3: DEFAULTS.c3,
        zoom: DEFAULTS.zoom,
        panX: 0, panY: 0
      };

      // ---- Build the pattern tile once ----
      function buildGroup(g, polyList) {
        var frag = document.createDocumentFragment();
        for (var i = 0; i < polyList.length; i++) {
          var p = document.createElementNS(SVGNS, "polygon");
          p.setAttribute("points", polyList[i]);
          frag.appendChild(p);
        }
        g.appendChild(frag);
      }
      buildGroup(groups.c1, DATA.polys.c1);
      buildGroup(groups.c2, DATA.polys.c2);
      buildGroup(groups.c3, DATA.polys.c3);

      pat.setAttribute("width", DATA.period);
      pat.setAttribute("height", DATA.height);

      // ---- Apply state to the SVG ----
      function applyColors() {
        groups.c1.setAttribute("fill", state.c1);
        groups.c2.setAttribute("fill", state.c2);
        groups.c3.setAttribute("fill", state.c3);
      }

      function applyTransform() {
        var s = BASE_SCALE * (state.zoom / 100);
        pat.setAttribute("patternTransform",
          "translate(" + state.panX + " " + state.panY + ") scale(" + s + ")");
      }

      function sizeSvg() {
        var w = window.innerWidth, h = window.innerHeight;
        art.setAttribute("width", w);
        art.setAttribute("height", h);
        art.setAttribute("viewBox", "0 0 " + w + " " + h);
      }

      // ---- Colour helpers ----
      function normHex(v) {
        v = String(v).trim().replace(/^#/, "");
        if (/^[0-9a-fA-F]{3}$/.test(v)) {
          v = v[0] + v[0] + v[1] + v[1] + v[2] + v[2];
        }
        return /^[0-9a-fA-F]{6}$/.test(v) ? "#" + v.toLowerCase() : null;
      }

      var colorKeys = ["c1", "c2", "c3"];
      var swatches = { c1: document.getElementById("sw1"), c2: document.getElementById("sw2"), c3: document.getElementById("sw3") };
      var hexInputs = { c1: document.getElementById("hx1"), c2: document.getElementById("hx2"), c3: document.getElementById("hx3") };

      function syncColorInputs(key) {
        swatches[key].value = state[key];
        hexInputs[key].value = state[key].replace("#", "").toUpperCase();
        hexInputs[key].classList.remove("invalid");
      }

      colorKeys.forEach(function (key) {
        // Native swatch picker
        swatches[key].addEventListener("input", function () {
          state[key] = swatches[key].value;
          hexInputs[key].value = state[key].replace("#", "").toUpperCase();
          hexInputs[key].classList.remove("invalid");
          applyColors();
        });
        // Hex text field
        hexInputs[key].addEventListener("input", function () {
          var norm = normHex(hexInputs[key].value);
          if (norm) {
            hexInputs[key].classList.remove("invalid");
            state[key] = norm;
            swatches[key].value = norm;
            applyColors();
          } else {
            hexInputs[key].classList.add("invalid");
          }
        });
        // Tidy up on blur
        hexInputs[key].addEventListener("blur", function () {
          syncColorInputs(key);
        });
      });

      // ---- Zoom ----
      var zoomInput = document.getElementById("zoom");
      var zoomReadout = document.getElementById("zoomReadout");

      function updateZoomReadout() { zoomReadout.textContent = Math.round(state.zoom) + "%"; }

      function setZoom(z) {
        z = Math.max(parseFloat(zoomInput.min), Math.min(parseFloat(zoomInput.max), z));
        state.zoom = z;
        zoomInput.value = z;
        updateZoomReadout();
        applyTransform();
      }

      zoomInput.addEventListener("input", function () { setZoom(parseFloat(zoomInput.value)); });
      document.getElementById("zoomIn").addEventListener("click", function () { setZoom(state.zoom * 1.15); });
      document.getElementById("zoomOut").addEventListener("click", function () { setZoom(state.zoom / 1.15); });

      art.addEventListener("wheel", function (e) {
        e.preventDefault();
        var factor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
        setZoom(state.zoom * factor);
      }, { passive: false });

      // ---- Pan (drag) ----
      var dragging = false, lastX = 0, lastY = 0;
      art.addEventListener("pointerdown", function (e) {
        dragging = true; lastX = e.clientX; lastY = e.clientY;
        art.classList.add("grabbing");
        art.setPointerCapture(e.pointerId);
      });
      art.addEventListener("pointermove", function (e) {
        if (!dragging) return;
        state.panX += e.clientX - lastX;
        state.panY += e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        applyTransform();
      });
      function endDrag(e) {
        dragging = false;
        art.classList.remove("grabbing");
        if (e && e.pointerId != null && art.hasPointerCapture && art.hasPointerCapture(e.pointerId)) {
          art.releasePointerCapture(e.pointerId);
        }
      }
      art.addEventListener("pointerup", endDrag);
      art.addEventListener("pointercancel", endDrag);

      // ---- Reset ----
      document.getElementById("resetBtn").addEventListener("click", function () {
        state.c1 = DEFAULTS.c1; state.c2 = DEFAULTS.c2; state.c3 = DEFAULTS.c3;
        state.zoom = DEFAULTS.zoom; state.panX = 0; state.panY = 0;
        colorKeys.forEach(syncColorInputs);
        zoomInput.value = DEFAULTS.zoom;
        updateZoomReadout();
        applyColors();
        applyTransform();
      });

      // ---- Save PNG ----
      document.getElementById("downloadBtn").addEventListener("click", function () {
        var w = window.innerWidth, h = window.innerHeight;
        var clone = art.cloneNode(true);
        clone.setAttribute("width", w);
        clone.setAttribute("height", h);
        clone.setAttribute("viewBox", "0 0 " + w + " " + h);
        var xml = new XMLSerializer().serializeToString(clone);
        var uri = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xml)));

        var img = new Image();
        img.onload = function () {
          var scaleOut = 2; // export at 2x for crispness
          var cv = document.createElement("canvas");
          cv.width = w * scaleOut; cv.height = h * scaleOut;
          var cx = cv.getContext("2d");
          cx.drawImage(img, 0, 0, cv.width, cv.height);
          var link = document.createElement("a");
          link.download = "pattern.png";
          link.href = cv.toDataURL("image/png");
          link.click();
        };
        img.src = uri;
      });

      // ---- Panel collapse ----
      var panel = document.getElementById("panel");
      document.getElementById("toggle").addEventListener("click", function () {
        panel.classList.remove("collapsed");
      });
      panel.querySelector("h1").addEventListener("dblclick", function () {
        panel.classList.add("collapsed");
      });

      // ---- Resize ----
      var resizeTimer = null;
      window.addEventListener("resize", function () {
        if (resizeTimer) cancelAnimationFrame(resizeTimer);
        resizeTimer = requestAnimationFrame(sizeSvg);
      });

      // ---- Init ----
      colorKeys.forEach(syncColorInputs);
      sizeSvg();
      applyColors();
      applyTransform();
      updateZoomReadout();
    })();
  </script>
</body>
</html>
