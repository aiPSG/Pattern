<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Generator</title>
  <style>
    :root {
      --panel-bg: rgba(20, 22, 34, 0.82);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #e8eaf2;
      --text-dim: #9aa0b4;
      --accent: #5b8cff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0b0d18;
    }

    #stage {
      position: fixed;
      inset: 0;
    }

    #pattern {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    /* ---- Control panel ---- */
    #panel {
      position: fixed;
      top: 18px;
      left: 18px;
      width: 268px;
      max-height: calc(100vh - 36px);
      overflow-y: auto;
      padding: 18px 18px 20px;
      border-radius: 14px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--text);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      z-index: 10;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    #panel.collapsed {
      transform: translateX(calc(-100% - 24px));
      opacity: 0;
      pointer-events: none;
    }

    #panel h1 {
      margin: 0 0 2px;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    #panel .subtitle {
      margin: 0 0 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .group {
      margin-bottom: 18px;
    }

    .group > label,
    .section-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 9px;
    }

    /* Color rows */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .color-row input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid var(--panel-border);
      border-radius: 9px;
      background: none;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 3px; }
    .color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }
    .color-row input[type="color"]::-moz-color-swatch { border: none; border-radius: 6px; }

    .color-row .meta {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }
    .color-row .meta .name { font-size: 13px; }
    .color-row .meta .hex {
      font-size: 11px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      text-transform: uppercase;
    }

    /* Zoom control */
    .zoom-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .zoom-control input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.18);
      outline: none;
    }
    .zoom-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid #dfe6ff;
    }
    .zoom-control input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid #dfe6ff;
    }

    .btn {
      -webkit-appearance: none;
      appearance: none;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 8px;
      width: 30px;
      height: 30px;
      font-size: 17px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
      transition: background 0.15s ease;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.14); }
    .btn:active { transform: translateY(1px); }

    .zoom-readout {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .text-btn {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .text-btn:hover { background: rgba(255, 255, 255, 0.14); }
    .text-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .text-btn.primary:hover { background: #4a7bf0; }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-top: 4px;
    }

    /* Panel toggle button */
    #toggle {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 11;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--text);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    #panel.collapsed ~ #toggle { display: flex; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="pattern"></canvas>
  </div>

  <div id="panel">
    <h1>Pattern Generator</h1>
    <p class="subtitle">Diagonal weave &middot; three tones</p>

    <div class="group">
      <span class="section-label">Colors</span>
      <div class="color-row">
        <input type="color" id="color1" value="#16193f" aria-label="Stripe color" />
        <div class="meta">
          <span class="name">Stripe</span>
          <span class="hex" id="hex1">#16193F</span>
        </div>
      </div>
      <div class="color-row">
        <input type="color" id="color2" value="#2c3769" aria-label="Band A" />
        <div class="meta">
          <span class="name">Band A</span>
          <span class="hex" id="hex2">#2C3769</span>
        </div>
      </div>
      <div class="color-row">
        <input type="color" id="color3" value="#242f5e" aria-label="Band B" />
        <div class="meta">
          <span class="name">Band B</span>
          <span class="hex" id="hex3">#242F5E</span>
        </div>
      </div>
    </div>

    <div class="group">
      <label for="zoom">Zoom / Scale</label>
      <div class="zoom-control">
        <button class="btn" id="zoomOut" aria-label="Zoom out">&minus;</button>
        <input type="range" id="zoom" min="14" max="170" step="1" value="46" />
        <button class="btn" id="zoomIn" aria-label="Zoom in">+</button>
      </div>
      <div class="zoom-readout" id="zoomReadout">100%</div>
    </div>

    <div class="group">
      <div class="row-actions">
        <button class="text-btn" id="resetBtn">Reset</button>
        <button class="text-btn primary" id="downloadBtn">Save PNG</button>
      </div>
      <p class="hint">Scroll to zoom &middot; drag to shift the pattern.</p>
    </div>
  </div>

  <button id="toggle" aria-label="Show controls">&#9776;</button>

  <script>
    (function () {
      "use strict";

      var canvas = document.getElementById("pattern");
      var ctx = canvas.getContext("2d");

      // ---- State ----
      var DEFAULTS = {
        color1: "#16193f", // dark navy stripe
        color2: "#2c3769", // mid (lighter)
        color3: "#242f5e", // mid (darker)
        zoom: 46
      };

      var state = {
        color1: DEFAULTS.color1,
        color2: DEFAULTS.color2,
        color3: DEFAULTS.color3,
        zoom: DEFAULTS.zoom, // brick height in px
        offsetX: 0,
        offsetY: 0
      };

      // ---- Pattern geometry ----
      // Reference zoom that maps to "100%"
      var BASE_UNIT = 46;
      // Brick width : height ratio. 2 gives a 45deg diagonal in running bond.
      var ASPECT = 2;
      // Colour sequence across diagonal bands (indices into [c1, c2, c3]).
      // dark -> lighter mid -> darker mid, repeating: a stepped ribbon.
      var BAND_SEQ = [0, 1, 2];

      function draw() {
        var dpr = window.devicePixelRatio || 1;
        var W = window.innerWidth;
        var H = window.innerHeight;

        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Base fill (avoids any hairline gaps between bricks).
        ctx.fillStyle = state.color1;
        ctx.fillRect(0, 0, W, H);

        // Running-bond brick grid. Every other row is offset by half a brick,
        // and each brick is coloured by its diagonal band so that like-coloured
        // bricks form continuous stepped "/" stripes.
        var bh = state.zoom;        // brick height
        var bw = bh * ASPECT;       // brick width
        var palette = [state.color1, state.color2, state.color3];
        var P = BAND_SEQ.length;

        var ox = state.offsetX;
        var oy = state.offsetY;

        // Logical brick indices covering the (panned) viewport, with a margin.
        var c0 = Math.floor(ox / bw) - 2;
        var c1 = Math.ceil((ox + W) / bw) + 2;
        var r0 = Math.floor(oy / bh) - 2;
        var r1 = Math.ceil((oy + H) / bh) + 2;

        for (var r = r0; r <= r1; r++) {
          var odd = r & 1;
          var yScreen = r * bh - oy;

          for (var c = c0; c <= c1; c++) {
            var xWorld = c * bw + (odd ? bw / 2 : 0);
            var xScreen = xWorld - ox;

            // Diagonal band index. In running bond the brick centres form a
            // centred-rectangular lattice; (a + r) is constant along a "/"
            // diagonal, so it selects the stripe a brick belongs to.
            var a = 2 * c + 1 + odd;
            var k = Math.floor((a + r - 1) / 2);
            var band = ((k % P) + P) % P;

            ctx.fillStyle = palette[BAND_SEQ[band]];
            // +1px overlap keeps neighbouring bricks seam-free.
            ctx.fillRect(xScreen, yScreen, bw + 1, bh + 1);
          }
        }
      }

      // ---- UI wiring ----
      function toHexUpper(v) { return v.toUpperCase(); }

      function updateZoomReadout() {
        var pct = Math.round((state.zoom / BASE_UNIT) * 100);
        document.getElementById("zoomReadout").textContent = pct + "%";
      }

      function bindColor(inputId, hexId, key) {
        var input = document.getElementById(inputId);
        var hex = document.getElementById(hexId);
        input.addEventListener("input", function () {
          state[key] = input.value;
          hex.textContent = toHexUpper(input.value);
          draw();
        });
      }

      bindColor("color1", "hex1", "color1");
      bindColor("color2", "hex2", "color2");
      bindColor("color3", "hex3", "color3");

      var zoomInput = document.getElementById("zoom");
      zoomInput.addEventListener("input", function () {
        state.zoom = parseFloat(zoomInput.value);
        updateZoomReadout();
        draw();
      });

      function setZoom(z) {
        z = Math.max(parseFloat(zoomInput.min), Math.min(parseFloat(zoomInput.max), z));
        state.zoom = z;
        zoomInput.value = z;
        updateZoomReadout();
        draw();
      }

      document.getElementById("zoomIn").addEventListener("click", function () {
        setZoom(state.zoom + 6);
      });
      document.getElementById("zoomOut").addEventListener("click", function () {
        setZoom(state.zoom - 6);
      });

      // Scroll to zoom
      canvas.addEventListener("wheel", function (e) {
        e.preventDefault();
        var delta = e.deltaY < 0 ? 1 : -1;
        setZoom(state.zoom + delta * Math.max(2, state.zoom * 0.08));
      }, { passive: false });

      // Drag to pan the pattern
      var dragging = false, lastX = 0, lastY = 0;
      canvas.addEventListener("pointerdown", function (e) {
        dragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        canvas.style.cursor = "grabbing";
        canvas.setPointerCapture(e.pointerId);
      });
      canvas.addEventListener("pointermove", function (e) {
        if (!dragging) return;
        var dx = e.clientX - lastX;
        var dy = e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        state.offsetX -= dx;
        state.offsetY -= dy;
        draw();
      });
      function endDrag(e) {
        dragging = false;
        canvas.style.cursor = "grab";
        if (e && e.pointerId != null && canvas.hasPointerCapture && canvas.hasPointerCapture(e.pointerId)) {
          canvas.releasePointerCapture(e.pointerId);
        }
      }
      canvas.addEventListener("pointerup", endDrag);
      canvas.addEventListener("pointercancel", endDrag);

      // Reset
      document.getElementById("resetBtn").addEventListener("click", function () {
        state.color1 = DEFAULTS.color1;
        state.color2 = DEFAULTS.color2;
        state.color3 = DEFAULTS.color3;
        state.zoom = DEFAULTS.zoom;
        state.offsetX = 0;
        state.offsetY = 0;
        document.getElementById("color1").value = DEFAULTS.color1;
        document.getElementById("color2").value = DEFAULTS.color2;
        document.getElementById("color3").value = DEFAULTS.color3;
        document.getElementById("hex1").textContent = toHexUpper(DEFAULTS.color1);
        document.getElementById("hex2").textContent = toHexUpper(DEFAULTS.color2);
        document.getElementById("hex3").textContent = toHexUpper(DEFAULTS.color3);
        zoomInput.value = DEFAULTS.zoom;
        updateZoomReadout();
        draw();
      });

      // Download PNG
      document.getElementById("downloadBtn").addEventListener("click", function () {
        var link = document.createElement("a");
        link.download = "pattern.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });

      // Panel collapse
      var panel = document.getElementById("panel");
      var toggle = document.getElementById("toggle");
      // Clicking the header area toggles nothing; provide toggle button only.
      toggle.addEventListener("click", function () {
        panel.classList.remove("collapsed");
      });
      // Add a small collapse affordance: double-click panel title to hide.
      panel.querySelector("h1").addEventListener("dblclick", function () {
        panel.classList.add("collapsed");
      });

      // Redraw on resize
      var resizeTimer = null;
      window.addEventListener("resize", function () {
        if (resizeTimer) cancelAnimationFrame(resizeTimer);
        resizeTimer = requestAnimationFrame(draw);
      });

      updateZoomReadout();
      draw();
    })();
  </script>
</body>
</html>
